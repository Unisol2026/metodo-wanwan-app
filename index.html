<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#2E9B8F" />
<link rel="manifest" href="manifest.json" />
<title>Método Wanwan — Matemática 5–12</title>
<style>
/* Fontes self-hosted (D-13): sem CDN, 100% offline, minimização LGPD. */
@font-face{font-family:'Fredoka';font-style:normal;font-weight:400;font-display:swap;src:url('assets/fonts/fredoka-400.woff2') format('woff2')}
@font-face{font-family:'Fredoka';font-style:normal;font-weight:500;font-display:swap;src:url('assets/fonts/fredoka-500.woff2') format('woff2')}
@font-face{font-family:'Fredoka';font-style:normal;font-weight:600;font-display:swap;src:url('assets/fonts/fredoka-600.woff2') format('woff2')}
@font-face{font-family:'Fredoka';font-style:normal;font-weight:700;font-display:swap;src:url('assets/fonts/fredoka-700.woff2') format('woff2')}
@font-face{font-family:'Nunito';font-style:normal;font-weight:400;font-display:swap;src:url('assets/fonts/nunito-400.woff2') format('woff2')}
@font-face{font-family:'Nunito';font-style:normal;font-weight:600;font-display:swap;src:url('assets/fonts/nunito-600.woff2') format('woff2')}
@font-face{font-family:'Nunito';font-style:normal;font-weight:700;font-display:swap;src:url('assets/fonts/nunito-700.woff2') format('woff2')}
@font-face{font-family:'Nunito';font-style:normal;font-weight:800;font-display:swap;src:url('assets/fonts/nunito-800.woff2') format('woff2')}

:root{
  --bg:#F4EEE6; --card:#FFFFFF; --surface2:#FBF7F1; --ink:#37312B; --muted:#7C7368; --line:#E7DED1;
  --brand:#1C6F66; --brand2:#2E9B8F; --brand-soft:#DCEFEC;
  --ok:#2F9E5E; --ok-soft:#DDF0E4; --warn:#C07617; --warn-soft:#FBEED4; --err:#C1493B; --err-soft:#FADFD7;
  --child1:#E39A26; --child2:#F3C879; --child3:#2E9B8F; --child4:#7FB6D8;
  --radius:20px; --shadow:0 8px 24px rgba(55,49,43,.07);
  --tap:52px;
  --font-display:'Fredoka','Nunito',system-ui,sans-serif; --font-body:'Nunito',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}
h1,h2,h3{margin:0 0 .4em;font-family:var(--font-display);font-weight:600}
.app{max-width:920px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* top surface switcher */
.topbar{display:flex;gap:6px;padding:12px 14px;background:var(--card);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20;align-items:center}
.brand{font-family:var(--font-display);font-weight:600;color:var(--brand);margin-right:auto;padding-left:6px;letter-spacing:.2px}
.brand small{color:var(--muted);font-weight:600;font-family:var(--font-body)}
.seg{display:flex;background:var(--surface2);border-radius:12px;padding:3px;border:1px solid var(--line)}
.seg button{padding:9px 13px;border-radius:9px;color:var(--muted);font-weight:700;font-size:13px}
.seg button.on{background:var(--brand);color:#fff}
.segwrap{display:flex;align-items:center;gap:8px}
.lockbtn{padding:9px 12px;border-radius:12px;background:var(--surface2);color:var(--muted);font-weight:700;font-size:13px;border:1px solid var(--line)}
.lockbtn:active{transform:scale(.96)}
.who{font-size:12px;color:var(--muted);padding:0 8px}

.view{padding:16px;flex:1}
.hidden{display:none!important}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.pill{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.pill.ok{background:var(--ok-soft);color:#1C7043;border-color:#B7E0C6} .pill.learn{background:var(--brand-soft);color:var(--brand);border-color:#BFE0DB}
.pill.warn{background:var(--warn-soft);color:var(--warn);border-color:#EED9AE} .pill.rev{background:var(--brand-soft);color:var(--brand2);border-color:#BFE0DB}
.muted{color:var(--muted)} .small{font-size:13px} .center{text-align:center}
.btn{background:var(--brand);color:#fff;padding:13px 18px;border-radius:14px;font-weight:800;min-height:var(--tap)}
.btn.ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--line)}
.btn.big{font-size:18px;padding:16px 22px;width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
code{background:var(--surface2);padding:1px 6px;border-radius:6px;font-size:12px;border:1px solid var(--line)}
.bar{height:10px;border-radius:999px;background:var(--surface2);overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:var(--brand2)}

/* CHILD surface */
.child-wrap{background:var(--surface2);min-height:70vh;border-radius:var(--radius);padding:18px;border:1px solid var(--line)}
.avatar{width:74px;height:74px;border-radius:50%;background:var(--warn-soft);border:3px solid var(--child1);color:var(--warn);
  display:grid;place-items:center;font-family:var(--font-display);font-weight:600;font-size:34px;box-shadow:var(--shadow)}
.mission-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow);text-align:center}
.big-btn{min-height:64px;border-radius:20px;font-size:20px;font-weight:800;color:#5A3B08;
  background:var(--child1);box-shadow:0 6px 0 #B87914;width:100%}
.big-btn.alt{background:var(--brand2);box-shadow:0 6px 0 var(--brand);color:#fff}
.progress-dots{display:flex;gap:6px;justify-content:center;margin:8px 0}
.progress-dots i{width:12px;height:12px;border-radius:50%;background:var(--line)}
.progress-dots i.done{background:var(--ok)} .progress-dots i.now{background:var(--brand);transform:scale(1.3)}
.prompt{font-size:22px;font-weight:700;font-family:var(--font-display);text-align:center;margin:6px 0 14px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.opt{min-height:70px;border-radius:16px;background:#fff;border:2px solid var(--line);font-size:26px;font-weight:800;font-family:var(--font-display)}
.opt:active{transform:scale(.97)}
.opt.sel{border-color:var(--brand2)} .opt.correct{border-color:var(--ok);background:var(--ok-soft)}
.opt.wrong{border-color:var(--err);background:var(--err-soft)}
.opt.txt{font-size:16px;padding:10px;font-family:var(--font-body)}
.speak{width:var(--tap);height:var(--tap);border-radius:50%;background:var(--brand-soft);border:2px solid var(--brand2);color:var(--brand);font-size:22px}
.feedback{border-radius:16px;padding:14px;margin-top:12px;font-weight:600}
.feedback.ok{background:var(--ok-soft);color:#1C6B45;border:1px solid #BFE8D2}
.feedback.no{background:var(--err-soft);color:#8F2E3C;border:1px solid #F2C7CF}
.stage{display:grid;place-items:center;min-height:150px;margin:6px 0}

/* ten-frame */
.tenframe{display:grid;grid-template-columns:repeat(5,44px);grid-auto-rows:44px;gap:6px;justify-content:center}
.tf-cell{width:44px;height:44px;border:2px solid #D8CFC1;border-radius:10px;background:#fff;display:grid;place-items:center}
.tf-cell.on{background:var(--brand2);border-color:var(--brand2)}
.tf-cell.ten{box-shadow:0 0 0 3px #E39A2666}
.dot{width:26px;height:26px;border-radius:50%;background:#fff}
.tf-cell.on .dot{background:#fff}
/* base10 */
.b10-zone{display:flex;gap:18px;justify-content:center;align-items:flex-end;min-height:120px}
.b10-col{text-align:center}
.bars{display:flex;gap:6px;align-items:flex-end;min-height:100px;justify-content:center}
.bar10{width:20px;height:100px;background:var(--brand2);border-radius:5px}
.cubes{display:grid;grid-template-columns:repeat(5,16px);gap:3px;justify-content:center;min-height:100px;align-content:flex-end}
.cube{width:16px;height:16px;background:#F2C88A;border:1px solid var(--child1);border-radius:3px}
.stepper{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px}
.stepper button{width:44px;height:44px;border-radius:12px;background:var(--surface2);border:1px solid var(--line);font-size:22px;font-weight:800;color:var(--ink)}
/* number line */
.numline{position:relative;height:90px;margin:20px 10px}
.nl-track{position:absolute;top:44px;left:0;right:0;height:6px;background:#D8CFC1;border-radius:3px}
.nl-tick{position:absolute;top:34px;width:2px;height:26px;background:#B9B0A2;transform:translateX(-1px)}
.nl-tick span{position:absolute;top:28px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--muted)}
.nl-marker{position:absolute;top:24px;width:0;height:0;transform:translateX(-11px)}
.nl-marker b{position:absolute;left:-11px;border-left:11px solid transparent;border-right:11px solid transparent;border-top:16px solid var(--child1)}
.nl-fixed{position:absolute;top:30px;width:14px;height:14px;border-radius:50%;background:var(--brand2);transform:translate(-7px,10px)}
.nl-hit{position:absolute;inset:0;cursor:pointer}
.dotcard{display:grid;gap:8px;padding:14px;background:#fff;border:2px solid var(--line);border-radius:16px}
.dc-row{display:flex;gap:10px;justify-content:center}
.dc-dot{width:26px;height:26px;border-radius:50%;background:var(--brand2)}
.badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:700;font-size:13px;margin:4px}
.badge .m{font-size:18px}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line)}
.tag{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--surface2);color:var(--muted);margin-right:4px;border:1px solid var(--line)}
.evf{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;border-radius:8px;font-size:11px;font-weight:800;margin-right:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.evf.got{background:var(--brand);color:#fff;border-color:var(--brand)}
.axis-h{display:flex;align-items:center;gap:8px;margin:14px 0 6px;font-weight:800}
details{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:8px}
summary{cursor:pointer;font-weight:700}
.note{font-size:12px;color:var(--muted);background:var(--surface2);border-radius:10px;padding:10px;margin-top:8px;border:1px solid var(--line)}
.mode-toggle{display:flex;gap:6px}
.mode-toggle button{padding:7px 11px;border-radius:9px;font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.mode-toggle button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.rubric button{margin:4px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#fff;font-weight:700;color:var(--ink)}
/* ===== v2: ilhas, trilhas, estrelas, dica ===== */
.islands{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.island{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 8px;text-align:center;box-shadow:var(--shadow);position:relative;cursor:pointer}
.island:active{transform:scale(.97)}
.island .ic{font-size:30px;line-height:1.1}
.island .nm{font-weight:800;font-size:12.5px;font-family:var(--font-display);margin-top:2px}
.island.locked{opacity:.55;filter:grayscale(.6);cursor:default}
.island .soon{font-size:10px;color:var(--muted)}
.ring{--p:0;width:46px;height:46px;border-radius:50%;margin:6px auto 0;display:grid;place-items:center;
  background:conic-gradient(var(--brand2) calc(var(--p)*1%),var(--line) 0)}
.ring>b{width:34px;height:34px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:11px;color:var(--brand)}
.starbar{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-weight:800;font-size:15px}
.trail{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.tcell{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px 12px;text-align:left;width:100%}
.tcell:not(.locked):not(.ghost):active{transform:scale(.985)}
.tcell.locked{opacity:.55}
.tcell.ghost{opacity:.45;border-style:dashed}
.seg6{display:flex;gap:3px}
.seg6 i{width:10px;height:16px;border-radius:4px;background:var(--line)}
.seg6 i.on{background:var(--brand2)} .seg6 i.gold{background:var(--child1)}
.hintbtn{background:var(--warn-soft);border:2px solid var(--child2);border-radius:14px;padding:9px 14px;font-weight:800;color:var(--warn);min-height:var(--tap)}
.hintbtn[disabled]{opacity:.5}
.stars-big{font-size:54px;letter-spacing:8px}
.star-dim{opacity:.22}
.celebrate{animation:pop .6s ease}
@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.selo{display:inline-flex;align-items:center;gap:6px;background:var(--ok-soft);border:1px solid #B7E0C6;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;color:#1C7043;margin:3px}
.selo.gold{background:var(--warn-soft);border-color:var(--child2);color:var(--warn)}
.bigchoice{display:grid;gap:10px;margin-top:12px}
.bigchoice button{min-height:60px;border-radius:16px;border:2px solid var(--line);background:#fff;font-size:17px;font-weight:800}
.bigchoice button:active{transform:scale(.98)}
.conf{font-size:10px;padding:2px 7px;border-radius:6px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);margin-left:4px}
.conf.alta{background:var(--ok-soft);color:#1C7043}.conf.media{background:var(--warn-soft);color:var(--warn)}
.opt.faded{opacity:.3;pointer-events:none}
@media(max-width:520px){.grid2,.grid3{grid-template-columns:1fr}.prompt{font-size:20px}.opt{font-size:22px}.islands{grid-template-columns:repeat(2,1fr)}}
/* ===== tesouros / cofre / baú (camada narrativa; design_brief_narrativa_e_tesouros.md) ===== */
.tale-band{background:linear-gradient(135deg,#EFE6F7,#E6EFFB);border:1px solid #D9CDEB;border-radius:16px;padding:12px 14px;margin:10px 0}
.tale-band h3{margin:0 0 2px;font-size:16px}
.tale-band .goal{font-size:13px;color:var(--muted)}
.cofre-btn{background:linear-gradient(135deg,#8E5BC8,#5B7FD8)!important;box-shadow:0 6px 0 #4A3E86!important;color:#fff!important}
.rar-legend{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.rar-legend .pill{font-size:11px}
.treasure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.tcard{background:#fff;border:2px solid var(--line);border-radius:16px;padding:12px 8px;text-align:center;position:relative}
.tcard .em{font-size:34px;line-height:1.1}
.tcard .tn{font-weight:800;font-size:12px;font-family:var(--font-display);margin-top:4px}
.tcard .rar{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;padding:2px 8px;border-radius:999px;display:inline-block}
.tcard .where{font-size:10.5px;color:var(--muted);margin-top:5px;line-height:1.25}
.tcard.locked{opacity:.85}
.tcard.locked .em{filter:grayscale(1) brightness(.7);opacity:.55}
.r-comum{border-color:#CFC7BB} .r-comum .rar{background:#EFEAE2;color:#7C7368}
.r-raro{border-color:#7FB6D8;box-shadow:0 0 0 2px #7FB6D833} .r-raro .rar{background:#E1EFF8;color:#2C6E96}
.r-epico{border-color:#B892E0;box-shadow:0 0 0 2px #B892E033} .r-epico .rar{background:#EDE2F7;color:#7A4CB0}
.r-lendario{border-color:var(--child1);box-shadow:0 0 14px #E39A2666} .r-lendario .rar{background:var(--warn-soft);color:var(--warn)}
.chest{font-size:70px;animation:chestpop .8s ease}
@keyframes chestpop{0%{transform:scale(.3) rotate(-8deg);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.reveal-treasure{animation:pop .7s ease}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">Método Wanwan <small>· mat 5–12</small></div>
    <div class="mode-toggle" id="modeToggle" title="Modo de sessão">
      <button data-mode="with_adult">✋ com adulto</button>
      <button data-mode="solo" class="on">sozinho</button>
    </div>
    <div class="segwrap">
      <div class="seg" id="surfaceSeg">
        <button data-s="child" class="on">Criança</button>
        <button data-s="parent">Responsável</button>
        <button data-s="admin">Admin</button>
      </div>
      <button id="lockBtn" class="lockbtn" title="Área do responsável">🔒</button>
    </div>
  </div>
  <div class="view" id="view"></div>
</div>
<script src="app-data.js"></script>
<script src="engine.js"></script>
<script src="app.js"></script>
<script>
/* A-16: registra o service worker para offline real. Guardado: nao roda no jsdom (test-ui) nem em file://. */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () { /* silencioso: app funciona sem SW */ });
  });
}
</script>
</body>
</html>

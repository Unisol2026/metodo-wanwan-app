     style 'unsafe-inline' por causa do <style> embutido e de element.style setados em JS (risco baixo).

/* Fontes self-hosted (D-13): sem CDN, 100% offline, minimização LGPD.

@font-face{font-family:'Lexend';font-style:normal;font-weight:700;font-display:swap;src:url('assets/fonts/lexend-700.woff2') format('woff2')}
@font-face{font-family:'Fredoka';font-style:normal;font-weight:400;font-display:swap;src:url('assets/fonts/fredoka-400.woff2') format('woff2')}
@font-face{font-family:'Fredoka';font-style:normal;font-weight:500;font-display:swap;src:url('assets/fonts/fredoka-500.woff2') format('woff2')}
@font-face{font-family:'Fredoka';font-style:normal;font-weight:600;font-display:swap;src:url('assets/fonts/fredoka-600.woff2') format('woff2')}

@font-face{font-family:'Nunito';font-style:normal;font-weight:700;font-display:swap;src:url('assets/fonts/nunito-700.woff2') format('woff2')}
@font-face{font-family:'Nunito';font-style:normal;font-weight:800;font-display:swap;src:url('assets/fonts/nunito-800.woff2') format('woff2')}

/* ===== Design tokens — handoff design_handoff_metodo_wanwan (paleta ativa: azul + Baloo 2) ===== */
:root{
  --bg:#FAF5EC; --card:#FFFFFF; --surface2:#FCF9F2; --ink:#2A2721; --muted:#6E675C; --faint:#A39A8B; --line:#EAE1D0;
  --brand:#3E66C9; --brand-ink:#2C4A99; --brand-soft:#DFE7FA; --brand2:#3E66C9; --deep:#14352E;
  --amber:#F0A429; --amber-ink:#8F5E06; --amber-soft:#FCEFD4;
  --ok:#31A264; --ok-ink:#1E7446; --ok-soft:#DCF2E4;
  --err:#E26A50; --err-ink:#A8402A; --err-soft:#FBE3DB;
  /* aliases legados (mantêm CSS/JS antigos coerentes com a paleta nova) */
  --warn:#8F5E06; --warn-soft:#FCEFD4;
  --child1:#F0A429; --child2:#F5CE8F; --child3:#3E66C9; --child4:#3B78C2;
  /* eixos: sempre cor + ícone, nunca só cor */
  --e1:#3B78C2; --e2:#8A63BD; --e3:#D08A1F; --e4:#17998A; --e5:#D25F72;
  --radius:20px;
  --shadow:0 10px 28px -24px rgba(42,39,33,.55);
  --shadow-lg:0 14px 36px -28px rgba(42,39,33,.5);
  --shadow-cta:0 8px 18px -10px rgba(62,102,201,.7);
  --tap:52px;
  --font-display:'Baloo 2','Fredoka','Nunito',system-ui,sans-serif;
  --font-body:'Plus Jakarta Sans','Nunito',system-ui,sans-serif;
}
/* Modo dislexia (configuração por criança, painel do responsável): corpo troca para Lexend */
html[data-dys="1"]{--font-body:'Lexend','Plus Jakarta Sans','Nunito',system-ui,sans-serif}
/* Modo alto contraste (handoff): tokens escurecem; informação nunca depende só de cor */
html[data-contrast="1"]{
  --ink:#000000; --muted:#3D372E; --faint:#57503F; --line:#8F8570; --bg:#FFFDF8; --surface2:#FFFFFF;
  --brand:#2C4A99; --ok:#1E7446; --err:#B03A20;
  --ok-ink:#0E5230; --amber-ink:#6B4400; --err-ink:#7E2812; --warn:#6B4400;
  --e1:#24528F; --e2:#64408F; --e3:#935E0D; --e4:#0E655B; --e5:#A23A4C;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}
h1,h2,h3{margin:0 0 .4em;font-family:var(--font-display);font-weight:600}
.app{max-width:920px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* top surface switcher */
.topbar{display:flex;gap:6px;padding:12px 14px;background:var(--card);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20;align-items:center}
.brand{font-family:var(--font-display);font-weight:600;color:var(--brand-ink);margin-right:auto;padding-left:6px;letter-spacing:.2px}
.brand small{color:var(--muted);font-weight:600;font-family:var(--font-body)}
.seg{display:flex;background:var(--surface2);border-radius:13px;padding:3px;border:1px solid var(--line)}
.seg button{padding:9px 13px;border-radius:10px;color:var(--muted);font-weight:700;font-size:13px}
.seg button.on{background:var(--brand);color:#fff}
.segwrap{display:flex;align-items:center;gap:8px}
.lockbtn{padding:9px 12px;border-radius:13px;background:var(--surface2);color:var(--muted);font-weight:700;font-size:13px;border:1px solid var(--line)}
.lockbtn:active{transform:scale(.96)}
.who{font-size:12px;color:var(--muted);padding:0 8px}

.view{padding:16px;flex:1}
.hidden{display:none!important}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.pill{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.pill.ok{background:var(--ok-soft);color:var(--ok-ink);border-color:var(--ok)} .pill.learn{background:var(--brand-soft);color:var(--brand-ink);border-color:var(--brand)}
.pill.warn{background:var(--amber-soft);color:var(--amber-ink);border-color:var(--amber)} .pill.rev{background:var(--brand-soft);color:var(--brand-ink);border-color:var(--brand)}
.pill.adult{display:inline-flex;align-items:center;gap:7px;background:var(--amber-soft);color:var(--amber-ink);border:1.5px solid var(--amber);font-size:12.5px;padding:7px 13px}
.muted{color:var(--muted)} .small{font-size:13px} .center{text-align:center}
.btn{background:var(--brand);color:#fff;padding:13px 18px;border-radius:16px;font-weight:800;min-height:var(--tap);box-shadow:var(--shadow-cta)}
.btn.ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.big{font-size:18px;padding:16px 22px;width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
code{background:var(--surface2);padding:1px 6px;border-radius:6px;font-size:12px;border:1px solid var(--line)}
.bar{height:12px;border-radius:999px;background:var(--surface2);overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:var(--brand);border-radius:999px}

/* CHILD surface */
.child-wrap{background:var(--bg);min-height:70vh;border-radius:24px;padding:18px;border:1px solid var(--line)}
.avatar{width:56px;height:56px;border-radius:50%;background:var(--amber-soft);border:2.5px solid var(--amber);color:var(--amber-ink);
  display:grid;place-items:center;font-family:var(--font-display);font-weight:600;font-size:24px}
.mission-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:var(--shadow);text-align:center}
/* hero "Missão do dia" (handoff tela 1): fundo marca-escura, círculos decorativos, CTA âmbar pill */
.mission-card.hero{position:relative;overflow:hidden;background:var(--brand-ink);border-color:var(--brand-ink);color:#fff;text-align:left;
  border-radius:28px;padding:24px;box-shadow:0 18px 40px -22px rgba(44,74,153,.8)}
.mission-card.hero::before{content:'';position:absolute;right:-28px;top:-28px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.09)}
.mission-card.hero::after{content:'';position:absolute;right:36px;bottom:-46px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.06)}
.mission-card.hero .kicker{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.8}
.mission-card.hero h2{color:#fff;font-size:26px;margin:6px 0 4px}
.mission-card.hero .sub{font-size:13.5px;opacity:.88;margin-bottom:16px;position:relative}
.mission-card.hero>*{position:relative}
.hero-cta{display:flex;align-items:center;gap:12px}
.hero-cta .eta{font-size:12.5px;opacity:.85;color:#fff}
.big-btn{min-height:56px;border-radius:999px;font-size:17px;font-weight:800;color:#3D2A05;
  background:var(--amber);box-shadow:0 8px 20px -8px rgba(0,0,0,.4);width:100%;padding:14px 26px}
.big-btn.alt{background:var(--brand);box-shadow:var(--shadow-cta);color:#fff}
.big-btn:active{transform:scale(.98)}
.mission-card.hero .big-btn.alt{background:rgba(255,255,255,.14);box-shadow:none;color:#fff;border:1px solid rgba(255,255,255,.25)}
.mission-card.hero .muted{color:rgba(255,255,255,.78)}
.mission-card.hero .sub,.mission-card.hero h2{max-width:240px}
.mission-card.hero .progress-dots i{background:rgba(255,255,255,.25)}
.mission-card.hero .progress-dots i.done{background:var(--ok)}
.mission-card.hero .progress-dots i.now{background:var(--amber);box-shadow:none}
/* mascote CSS (handoff) — placeholder até a arte oficial */
.mascot{width:86px;height:80px;animation:float 3.4s ease-in-out infinite;pointer-events:none}
.mission-card.hero .mascot{position:absolute;right:12px;top:12px}
.mascot i{position:absolute;display:block}
.mascot .m-ear{width:26px;height:42px;background:#C9873B;border-radius:13px;top:6px}
.mascot .m-ear.l{left:0;transform:rotate(-26deg)} .mascot .m-ear.r{right:0;transform:rotate(26deg)}
.mascot .m-head{left:8px;top:8px;width:70px;height:66px;background:#F2C88A;border-radius:50% 50% 48% 48%}
.mascot .m-eye{width:8px;height:10px;background:#2A2721;border-radius:50%;top:34px}
.mascot .m-eye.l{left:27px} .mascot .m-eye.r{right:27px}
.mascot .m-muz{left:50%;transform:translateX(-50%);top:44px;width:30px;height:22px;background:#FCF3E2;border-radius:50%}
.mascot .m-nose{left:50%;transform:translateX(-50%);top:46px;width:11px;height:8px;background:#2A2721;border-radius:50%}
.mascot .m-tongue{left:50%;transform:translateX(-50%);top:58px;width:10px;height:9px;background:#E26A50;border-radius:0 0 8px 8px}
/* modo preferido (painel do responsável) */
.segmode{display:flex;gap:8px;margin:8px 0 14px}
.segmode button{flex:1;min-height:48px;border:1.5px solid var(--line);border-radius:13px;font-weight:800;font-size:13.5px;color:var(--muted);background:#fff}
.segmode button.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-ink)}
.progress-dots{display:flex;gap:6px;margin:10px 0}
.progress-dots i{flex:1;height:10px;border-radius:999px;background:var(--line)}
.progress-dots i.done{background:var(--ok)} .progress-dots i.now{background:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.prompt{font-size:20px;font-weight:700;font-family:var(--font-display);text-align:center;margin:6px 0 14px}
/* botão de áudio do enunciado (handoff): pill marca-soft com play + equalizador animado */
.audio-pill{width:100%;display:flex;align-items:center;gap:11px;border:1.5px solid var(--brand);background:var(--brand-soft);color:var(--brand-ink);
  font-family:var(--font-body);font-weight:700;font-size:15px;padding:12px 15px;border-radius:18px;min-height:52px;margin:6px 0 12px;text-align:left}
.audio-pill .ap-ic{width:30px;height:30px;flex:none;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff}
.audio-pill .ap-ic::before{content:'';width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:10px solid #fff;margin-left:2px}
.audio-pill .ap-txt{flex:1;line-height:1.35}
.audio-pill .eq{display:flex;align-items:flex-end;gap:2px;height:18px}
.audio-pill .eq i{width:3px;height:100%;background:var(--brand);border-radius:2px;animation:sw 1s infinite;animation-play-state:paused}
.audio-pill .eq i:nth-child(2){animation-delay:.2s} .audio-pill .eq i:nth-child(3){animation-delay:.4s}
.audio-pill.playing .eq i{animation-play-state:running}
@keyframes sw{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.opt{min-height:64px;border-radius:16px;background:#fff;border:2px solid var(--line);font-size:24px;font-weight:600;font-family:var(--font-display);color:var(--ink)}
.opt:active{transform:scale(.97)}
.opt.sel{border-color:var(--brand)} .opt.correct{border-color:var(--ok);background:var(--ok-soft)}
.opt.wrong{border-color:var(--err);background:var(--err-soft)}
.opt.txt{font-size:15px;padding:10px;font-family:var(--font-body);font-weight:700}
.speak{width:var(--tap);height:var(--tap);border-radius:50%;background:var(--brand-soft);border:2px solid var(--brand);color:var(--brand-ink);font-size:22px}
/* cartões de feedback (handoff): sucesso explica o conceito; erro conceitual "Quase! Vamos pensar juntos" */
.feedback{border-radius:20px;padding:16px;margin-top:12px;font-weight:600;text-align:left;animation:fadeUp .3s ease}
.feedback.ok{background:var(--ok-soft);color:var(--ok-ink);border:1.5px solid var(--ok)}
.feedback.no{background:var(--err-soft);color:var(--err-ink);border:1.5px solid var(--err)}
.feedback .fb-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-family:var(--font-display);font-weight:600;font-size:17px}
.feedback .fb-ic{width:30px;height:30px;flex:none;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
.feedback.ok .fb-ic{border-radius:50%;background:var(--ok)}
.feedback.no .fb-ic{border-radius:10px;background:var(--err)}
.feedback .fb-b{font-size:13.5px;font-weight:600;line-height:1.45}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.stage{display:grid;place-items:center;min-height:150px;margin:6px 0}

/* ten-frame */
.tenframe{display:grid;grid-template-columns:repeat(5,44px);grid-auto-rows:44px;gap:6px;justify-content:center;
  padding:6px;background:var(--surface2);border-radius:14px;border:1px solid var(--line)}
.tf-cell{width:44px;height:44px;border:2px solid var(--line);border-radius:10px;background:#fff;display:grid;place-items:center}
.tf-cell.on{background:var(--brand);border-color:var(--brand)}
.tf-cell.ten{box-shadow:0 0 0 3px rgba(240,164,41,.4)}
.dot{width:26px;height:26px;border-radius:50%;background:#fff}
.tf-cell.on .dot{background:#fff}
/* base10 */
.b10-zone{display:flex;gap:18px;justify-content:center;align-items:flex-end;min-height:120px}
.b10-col{text-align:center}
.bars{display:flex;gap:6px;align-items:flex-end;min-height:100px;justify-content:center}
.bar10{width:20px;height:100px;background:var(--e3);border-radius:5px}
.cubes{display:grid;grid-template-columns:repeat(5,16px);gap:3px;justify-content:center;min-height:100px;align-content:flex-end}
.cube{width:16px;height:16px;background:var(--child2);border:1.5px solid var(--e3);border-radius:4px}
.stepper{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px}
.stepper button{width:44px;height:44px;border-radius:12px;background:var(--surface2);border:1px solid var(--line);font-size:22px;font-weight:800;color:var(--ink)}
/* number line */
.numline{position:relative;height:90px;margin:20px 10px}
.nl-track{position:absolute;top:44px;left:0;right:0;height:6px;background:var(--line);border-radius:3px}
.nl-tick{position:absolute;top:34px;width:2px;height:26px;background:var(--faint);transform:translateX(-1px)}
.nl-tick span{position:absolute;top:28px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--muted)}
.nl-marker{position:absolute;top:24px;width:0;height:0;transform:translateX(-11px)}
.nl-marker b{position:absolute;left:-11px;border-left:11px solid transparent;border-right:11px solid transparent;border-top:16px solid var(--amber)}
.nl-fixed{position:absolute;top:30px;width:14px;height:14px;border-radius:50%;background:var(--brand);transform:translate(-7px,10px)}
.nl-hit{position:absolute;inset:0;cursor:pointer}
.dotcard{display:grid;gap:8px;padding:14px;background:#fff;border:2px solid var(--line);border-radius:16px}
.dc-row{display:flex;gap:10px;justify-content:center}
.dc-dot{width:26px;height:26px;border-radius:50%;background:var(--brand)}
.badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:700;font-size:13px;margin:4px}
.badge .m{font-size:18px}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line)}
.tag{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--surface2);color:var(--muted);margin-right:4px;border:1px solid var(--line)}
.evf{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;border-radius:8px;font-size:11px;font-weight:800;margin-right:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.evf.got{background:var(--brand);color:#fff;border-color:var(--brand)}
.axis-h{display:flex;align-items:center;gap:8px;margin:14px 0 6px;font-weight:800}
details{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:8px}
summary{cursor:pointer;font-weight:700}
.note{font-size:12px;color:var(--muted);background:var(--surface2);border-radius:12px;padding:10px 12px;margin-top:8px;border:1px solid var(--line)}
.mode-toggle{display:flex;gap:6px}
.mode-toggle button{padding:7px 11px;border-radius:10px;font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.mode-toggle button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.rubric button{margin:4px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#fff;font-weight:700;color:var(--ink)}
/* toggles de acessibilidade (handoff tela 11) */
.tgl{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:transparent;color:var(--ink);
  text-align:left;padding:10px 2px;min-height:52px;border-top:1px solid var(--line)}
.tgl .t-l{display:block;font-weight:700;font-size:14px}
.tgl .t-d{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
.tgl .track{width:42px;height:24px;border-radius:12px;background:var(--line);position:relative;flex:none;transition:background .2s}
.tgl .track i{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s}
.tgl.on .track{background:var(--ok)} .tgl.on .track i{left:20px}
/* stat-cards do painel (handoff tela 8) */
.stat{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow);text-align:left;margin:0}
.stat .v{font-family:var(--font-display);font-weight:600;font-size:32px;line-height:1;color:var(--brand-ink)}
.stat .l{font-weight:700;font-size:13px;margin-top:7px;color:var(--ink)}
/* ===== v2: ilhas, trilhas, estrelas, dica ===== */
.islands{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.island{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px 8px;text-align:center;box-shadow:var(--shadow);position:relative;cursor:pointer}
.island:active{transform:scale(.97)}
.island .ic{font-size:30px;line-height:1.1}
.island .nm{font-weight:600;font-size:12.5px;font-family:var(--font-display);margin-top:2px}
.island.locked{opacity:.55;filter:grayscale(.6);cursor:default}
.island .soon{font-size:10px;color:var(--muted)}
.ring{--p:0;width:46px;height:46px;border-radius:50%;margin:6px auto 0;display:grid;place-items:center;
  background:conic-gradient(var(--brand) calc(var(--p)*1%),var(--line) 0)}
.ring>b{width:34px;height:34px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:11px;color:var(--brand-ink)}
.starbar{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-weight:800;font-size:14px;box-shadow:0 4px 12px -8px rgba(42,39,33,.4)}
.trail{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.tcell{display:flex;align-items:center;gap:13px;background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:12px 14px;text-align:left;width:100%;box-shadow:0 6px 16px -14px rgba(42,39,33,.5)}
.tcell:not(.locked):not(.ghost):active{transform:scale(.985)}
.tcell.locked{opacity:.55}
.tcell.ghost{opacity:.45;border-style:dashed}
.seg6{display:flex;gap:3px}
.seg6 i{width:10px;height:16px;border-radius:4px;background:var(--line)}
.seg6 i.on{background:var(--brand)} .seg6 i.gold{background:var(--amber)}
.hintbtn{background:var(--amber-soft);border:1.5px solid var(--amber);border-radius:999px;padding:9px 16px;font-weight:800;color:var(--amber-ink);min-height:var(--tap)}
.hintbtn[disabled]{opacity:.5}
.stars-big{font-size:54px;letter-spacing:8px}
.star-dim{opacity:.22}
.celebrate{animation:pop .6s ease}
@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.selo{display:inline-flex;align-items:center;gap:6px;background:var(--ok-soft);border:1px solid var(--ok);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;color:var(--ok-ink);margin:3px}
.selo.gold{background:var(--amber-soft);border-color:var(--amber);color:var(--amber-ink)}
.bigchoice{display:grid;gap:10px;margin-top:12px}
.bigchoice button{min-height:60px;border-radius:16px;border:2px solid var(--line);background:#fff;font-size:16px;font-weight:800;color:var(--ink)}
.bigchoice button:active{transform:scale(.98)}
.conf{font-size:10px;padding:2px 7px;border-radius:6px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);margin-left:4px}
.conf.alta{background:var(--ok-soft);color:var(--ok-ink)}.conf.media{background:var(--amber-soft);color:var(--amber-ink)}
.opt.faded{opacity:.3;pointer-events:none}
@media(max-width:520px){.grid2,.grid3{grid-template-columns:1fr}.prompt{font-size:19px}.opt{font-size:22px}.islands{grid-template-columns:repeat(2,1fr)}}
/* ===== tesouros / cofre / baú (camada narrativa; design_brief_narrativa_e_tesouros.md) ===== */
.tale-band{background:linear-gradient(135deg,var(--brand-soft),var(--surface2));border:1px solid var(--line);border-radius:18px;padding:12px 14px;margin:10px 0}
.tale-band h3{margin:0 0 2px;font-size:16px}
.tale-band .goal{font-size:13px;color:var(--muted)}
.cofre-btn{background:linear-gradient(135deg,#8E5BC8,#5B7FD8)!important;box-shadow:0 10px 22px -10px rgba(74,62,134,.7)!important;color:#fff!important}
.rar-legend{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.rar-legend .pill{font-size:11px}
.treasure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.tcard{background:#fff;border:2px solid var(--line);border-radius:16px;padding:12px 8px;text-align:center;position:relative}
.tcard .em{font-size:34px;line-height:1.1}
.tcard .tn{font-weight:600;font-size:12px;font-family:var(--font-display);margin-top:4px}
.tcard .rar{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;padding:2px 8px;border-radius:999px;display:inline-block}
.tcard .where{font-size:10.5px;color:var(--muted);margin-top:5px;line-height:1.25}
.tcard.locked{opacity:.85}
.tcard.locked .em{filter:grayscale(1) brightness(.7);opacity:.55}
.r-comum{border-color:var(--line)} .r-comum .rar{background:var(--surface2);color:var(--muted)}
.r-raro{border-color:var(--e1);box-shadow:0 0 0 2px rgba(59,120,194,.2)} .r-raro .rar{background:var(--brand-soft);color:var(--brand-ink)}
.r-epico{border-color:var(--e2);box-shadow:0 0 0 2px rgba(138,99,189,.2)} .r-epico .rar{background:#EDE2F7;color:#7A4CB0}
.r-lendario{border-color:var(--amber);box-shadow:0 0 14px rgba(240,164,41,.4)} .r-lendario .rar{background:var(--amber-soft);color:var(--amber-ink)}
.chest{font-size:70px;animation:chestpop .8s ease}
@keyframes chestpop{0%{transform:scale(.3) rotate(-8deg);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.reveal-treasure{animation:pop .7s ease}

/* ===== FATIA VERTICAL — tema "João e o Pé de Feijão" (SNC / axis 1); arte preservada, molduras no tom novo ===== */
.snc-hero{position:relative;border-radius:20px;overflow:hidden;padding:16px 18px;margin:10px 0;min-height:150px;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.55)),url('assets/img/fundo-mapa.jpg') center/cover;
  border:2px solid var(--line)}
.snc-hero h3{color:var(--brand-ink);text-shadow:0 1px 0 #fff;margin-bottom:4px}
.snc-hero .goal{color:var(--ink);font-weight:700;background:rgba(255,255,255,.72);display:inline-block;
  padding:5px 11px;border-radius:999px;font-size:13px;margin-top:6px}
.snc-hero .prog{color:var(--brand-ink);font-weight:700;background:rgba(255,255,255,.66);display:inline-block;
  padding:3px 9px;border-radius:999px;font-size:12px;margin-top:8px}
.snc-hero .joao{position:absolute;right:6px;bottom:0;width:78px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.25))}
.island.isl-snc{background:linear-gradient(180deg,rgba(255,255,255,.32),rgba(255,255,255,.85)),
  url('assets/img/fundo-mapa.jpg') center/cover;border-color:var(--line)}
.exp-scene{border-radius:16px;height:150px;margin:12px 0 4px;border:2px solid rgba(255,255,255,.35);
  background:url('assets/img/exploracao-mapa.jpg') center/cover;box-shadow:0 6px 18px rgba(0,0,0,.18)}
.scene-stage{position:relative;border-radius:18px;overflow:hidden;height:230px;margin:6px 0 12px;
  background:url('assets/img/cena-cap1.jpg') center 72%/cover;border:2px solid var(--line);
  box-shadow:inset 0 -46px 42px -22px rgba(0,0,0,.16)}
.reveal-line{opacity:0;animation:revIn .55s ease forwards}
.reveal-line.d1{animation-delay:.10s}.reveal-line.d2{animation-delay:.65s}.reveal-line.d3{animation-delay:1.15s}
@keyframes revIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.art-chest{width:150px;height:auto;animation:chestpop .8s ease}
.art-treasure{width:132px;height:auto;animation:pop .7s ease;display:block;margin:2px auto}

/* ===== MAPA DO CONTO (11/07/2026) — a trilha virou o CENÁRIO da história =====
   O caminho avança pelo caule/estrada do conto; cada parada é um CAPÍTULO;
   dentro do capítulo as habilidades viram os OBJETOS da cena (feijões, folhas,
   nuvens, portas). Genérico p/ as 12 ilhas: muda a arte e o glifo, não o widget. */
.tale-map{position:relative;border-radius:26px;overflow:hidden;border:2px solid var(--line);
  box-shadow:var(--shadow-lg);margin:12px 0 6px;background:var(--surface2) center/cover no-repeat;
  --vine:#4E9E4A;--vine2:#8FD37A}
.tale-map::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.66),rgba(255,255,255,.20) 30%,rgba(255,255,255,.30) 72%,rgba(255,255,255,.74))}
.tm-head{position:relative;z-index:2;padding:16px 18px 4px;text-align:center}
.tm-head h3{margin:0 0 4px;color:var(--brand-ink);text-shadow:0 1px 0 #fff;font-size:19px}
.tm-head .goal{display:inline-block;background:rgba(255,255,255,.82);border-radius:999px;padding:5px 12px;
  font-size:12.5px;font-weight:700;color:var(--ink)}
.tm-head .prog{display:block;margin-top:7px;font-size:12px;font-weight:800;color:var(--brand-ink)}
.tm-path{position:relative;z-index:2;padding:6px 0 14px}
.tm-vine{position:absolute;left:50%;top:6px;bottom:10px;width:18px;transform:translateX(-50%);border-radius:999px;
  background:linear-gradient(180deg,var(--vine2),var(--vine));
  box-shadow:inset -4px 0 0 rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.20)}
.tm-stop{position:relative;height:106px;display:flex;align-items:center;justify-content:center}
.tm-node{position:relative;z-index:3;width:74px;height:74px;border-radius:50%;background:#fff;border:4px solid var(--line);
  display:grid;place-items:center;font-size:32px;box-shadow:0 8px 18px -8px rgba(42,39,33,.55)}
.tm-stop.open .tm-node{border-color:var(--brand);box-shadow:0 0 0 6px var(--brand-soft),0 8px 18px -8px rgba(42,39,33,.5)}
.tm-stop.done .tm-node{border-color:var(--ok);background:var(--ok-soft)}
.tm-stop.locked .tm-node{filter:grayscale(1);opacity:.7;cursor:default}
.tm-stop:not(.locked) .tm-node:active{transform:scale(.96)}
.tm-num{position:absolute;left:-5px;top:-5px;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;
  font-family:var(--font-display);font-weight:700;font-size:13px;display:grid;place-items:center;border:2px solid #fff}
.tm-stop.done .tm-num{background:var(--ok)} .tm-stop.locked .tm-num{background:var(--faint)}
.tm-chk{position:absolute;right:-8px;bottom:-4px;font-size:22px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.tm-label{position:absolute;top:50%;transform:translateY(-50%);width:33%;background:rgba(255,255,255,.92);
  border:1px solid var(--line);border-radius:14px;padding:8px 10px;box-shadow:var(--shadow);pointer-events:none}
.tm-stop.l .tm-label{left:3%} .tm-stop.r .tm-label{right:3%}
.tm-label b{display:block;font-family:var(--font-display);font-weight:600;font-size:13.5px;line-height:1.2;color:var(--ink)}
.tm-label span{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-top:2px}
.tm-stop.summit{height:96px}
.tm-stop.summit .tm-node{width:82px;height:82px;font-size:38px;border-color:var(--amber);background:var(--amber-soft)}
.tm-stop.summit.locked .tm-node{border-color:var(--line);background:#fff}
@media(max-width:520px){.tm-label{width:30%;padding:7px 8px}.tm-label b{font-size:12px}
  .tm-label span{font-size:11px}.tm-node{width:66px;height:66px;font-size:28px}.tm-stop{height:98px}}
/* cena do capítulo: cada habilidade é um objeto do cenário, não uma linha de lista */
.ch-scene{position:relative;height:170px;border-radius:18px;margin:0 0 10px;border:2px solid var(--line);
  background:var(--surface2) center/cover no-repeat;box-shadow:inset 0 -40px 36px -22px rgba(0,0,0,.18)}
.ch-beat{font-size:16px;line-height:1.45;margin:8px 4px 2px;text-align:left}
.props{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:10px;margin-top:14px}
.prop{background:#fff;border:2px solid var(--line);border-radius:18px;padding:12px 8px 10px;text-align:center;
  box-shadow:0 6px 16px -14px rgba(42,39,33,.5);display:flex;flex-direction:column;align-items:center;gap:4px}
.prop:not(.locked):not(.ghost):active{transform:scale(.97)}
.prop .pg{font-size:34px;line-height:1}
.prop .pn{font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--ink)}
.prop .pd{font-size:10.5px;color:var(--muted);line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prop.open{border-color:var(--brand)}
.prop.done{border-color:var(--ok);background:var(--ok-soft)}
.prop.locked{opacity:.55;filter:grayscale(.7)}
.prop.ghost{opacity:.45;border-style:dashed}
/* A QUESTÃO ACONTECE DENTRO DA CENA (11/07/2026 — correção do "frio"):
   o ambiente do conto é o fundo da tela inteira e a cena do capítulo abre a missão. */
.child-wrap.tale-stage{position:relative;overflow:hidden;border:none;padding:14px;
  background:var(--bg) center/cover no-repeat}
.child-wrap.tale-stage::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(250,245,236,.55),rgba(250,245,236,.86) 42%,rgba(250,245,236,.95))}
.child-wrap.tale-stage>*{position:relative;z-index:1}
.quest-scene{position:relative;overflow:hidden;border-radius:20px;height:150px;margin:8px 0 10px;
  background:var(--surface2) center 62%/cover no-repeat;border:2px solid #fff;
  box-shadow:0 12px 26px -18px rgba(42,39,33,.7)}
.quest-scene .qs-cap{position:absolute;left:10px;right:10px;bottom:10px;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.92);border-radius:14px;padding:7px 11px;box-shadow:var(--shadow)}
.quest-scene .qg{font-size:22px;line-height:1}
.quest-scene .qt{font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--brand-ink);line-height:1.15}
.quest-scene .qs{font-size:11px;font-weight:700;color:var(--muted)}
.quest-scene .qs-joao{position:absolute;right:8px;top:6px;width:62px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
.child-wrap.tale-stage .mission-card{background:rgba(255,255,255,.97);border-color:#fff;
  box-shadow:0 16px 40px -26px rgba(42,39,33,.85)}
/* trilha do herói DENTRO da cena: substitui as bolinhas abstratas de progresso */
.quest-scene{height:186px}
.qs-track{position:absolute;inset:0;pointer-events:none}
.qs-mark{position:absolute;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.72);
  border:2px solid rgba(42,39,33,.25);transform:translate(-50%,50%);transition:background .3s}
.qs-mark.on{background:var(--amber);border-color:#fff;box-shadow:0 0 0 4px rgba(240,164,41,.35)}
.qs-hero{position:absolute;width:56px;transform:translate(-50%,42%);transition:left .5s ease,bottom .5s ease;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.35));animation:float 3.4s ease-in-out infinite}
.qs-hero.fixed{position:absolute;left:auto;right:8px;bottom:auto;top:6px;width:62px;transform:none;transition:none}
.qs-bubble{position:absolute;left:10px;top:10px;max-width:64%;background:#fff;border-radius:16px 16px 16px 4px;
  padding:8px 12px;font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--ink);
  border:1.5px solid var(--line);box-shadow:var(--shadow);animation:fadeUp .35s ease}
.qs-bubble.ok{border-color:var(--ok);color:var(--ok-ink)}
.qs-bubble.no{border-color:var(--amber);color:var(--amber-ink)}
.rev-chip{flex:none;font-size:10.5px;font-weight:800;color:var(--brand-ink);background:var(--brand-soft);
  border:1px solid var(--brand);border-radius:999px;padding:3px 8px}
/* missão do dia: entra pelo mapa, com a parada de hoje pulsando */
.today-band{position:relative;z-index:2;background:var(--brand-ink);color:#fff;border-radius:20px;padding:14px 16px;margin:10px 0 2px;
  box-shadow:0 14px 30px -20px rgba(44,74,153,.9)}
.today-band .tb-t{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
.today-band .tb-s{font-family:var(--font-display);font-weight:600;font-size:18px;margin:2px 0 10px}
.today-band .big-btn{width:auto;padding:12px 26px;min-height:50px}
.tm-stop.pulse .tm-node{animation:pulseNode 1.6s ease-in-out infinite}
@keyframes pulseNode{0%,100%{box-shadow:0 0 0 6px var(--amber-soft),0 8px 18px -8px rgba(42,39,33,.5)}
  50%{box-shadow:0 0 0 14px rgba(240,164,41,.28),0 8px 18px -8px rgba(42,39,33,.5)}}
.tm-stop.pulse .tm-node{border-color:var(--amber)}
@media(max-width:520px){.quest-scene{height:158px}.qs-hero{width:48px}.qs-bubble{font-size:12.5px;max-width:70%}}
/* manipulativos vestidos com o objeto do capítulo (feijão, folha, nuvem...) */
.dc-dot.glyph{background:transparent;width:auto;height:auto;font-size:26px;line-height:1}
.tenframe.glyphed .tf-cell.on{background:var(--amber-soft);border-color:var(--amber)}
.tf-cell .dot.glyph{background:transparent;width:auto;height:auto;font-size:22px;line-height:1}
</style>
</head>
